        - Cart Items
      summary: Create Cart Item
      operationId: createCartItem
      description: Create a cart item which will be linked to a plan. The plan is a
        collection of line items. To set metadata for a specific line item, use
        the metadata object with the key as the line item slug.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCartItemRequestSchema"
      responses:
        "201":
          description: Successfully created cart item
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    const: object
                    type: string
                  data:
                    additionalProperties: false
                    type: object
                    properties:
                      id:
                        type: string
                      organisation:
                        type: string
                      cartId:
                        type: string
                      planId:
                        type: string
                      metadata:
                        anyOf:

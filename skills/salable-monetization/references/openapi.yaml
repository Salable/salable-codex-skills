openapi: 3.1.0
info:
  title: Salable API
  version: 0.0.0
servers:
  - url: https://salable.app
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  parameters:
    ResourceIdPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID
    IdempotencyKeyHeaderParam:
      in: header
      name: idempotency-key
      required: false
      schema:
        type: string
        maxLength: 255
      description: Optional idempotency key to prevent duplicate requests. Use unique
        strings like V4 UUIDs to avoid collisions. The key will be deleted after
        24 hours.
  schemas:
    ErrorResponseBody:
      type: object
      properties:
        title:
          type: string
        detail:
          type:
            - string
            - "null"
        errors:
          type:
            - array
            - "null"
          items:
            type: object
          description: The shape will be dependant on the error type
    CreateProductResponseSchema:
      type: object
      properties:
        type:
          const: object
          type: string
        data:
          additionalProperties: false
          type: object
          properties:
            id:
              type: string
            organisation:
              type: string
            name:
              type: string
            isActive:
              type: boolean
            archivedAt:
              type:
                - string
                - "null"
            createdAt:
              type: string
            updatedAt:
              type: string
          required:
            - id
            - organisation
            - name
            - isActive
            - archivedAt
            - createdAt
            - updatedAt
      required:
        - type
        - data
    UpdateProductResponseSchema:
      additionalProperties: false
      type: object
      properties:
        type:
          const: object
          type: string
        data:
          additionalProperties: false
          type: object
          properties:

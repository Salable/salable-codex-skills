paths:
  /api/ai/conversations:
    get:
      tags:
        - AI Conversations
      summary: List AI Conversations
      operationId: listAiConversations
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: before
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: string
          description: The number of records returned in a response. Value between 1 and
            100. Defaults to 25.
      responses:
        "200":
          description: Successfully retrieved AI conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAiConversationListSchema"
        "400":
          description: Invalid request or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseBody"
        "401":
          description: Unauthenticated, invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseBody"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseBody"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseBody"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseBody"

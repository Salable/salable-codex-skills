  /api/checkout:
    post:
      tags:
        - Checkout
      summary: Generate Quick Checkout Link
      operationId: generateQuickCheckoutLink
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                planId:
                  type: string
                  description: The unique identifier of the plan to checkout
                owner:
                  type: string
                  description: The unique identifier for the owner who will purchase the
                    subscription
                grantee:
                  type: string
                  description: The unique identifier for the grantee who will receive access. Can
                    be an individual grantee ID or a group ID (starting with
                    grp_). If not provided, a new group will be created for the
                    owner.
                interval:
                  enum:
                    - day
                    - week
                    - month
                    - year
                  type:
                    - string
                    - "null"
                  description: The billing interval for recurring charges (e.g., month, year).
                    Required for subscription mode. Set to null for one-time
                    payments.
                intervalCount:
                  type:
                    - number
                    - "null"
                  description: The number of intervals between billings. For example,
                    intervalCount of 3 with interval of month represents billing
                    every 3 months.
                currency:
                  type: string
                  enum:
                    - USD
                    - AED
                    - AFN
                    - ALL
                    - AMD
                    - ANG
                    - AOA
                    - ARS
                    - AUD
                    - AWG
                    - AZN
                    - BAM
                    - BBD
                    - BDT
                    - BGN
                    - BIF
                    - BMD
                    - BND
                    - BOB
                    - BRL
                    - BSD
                    - BWP
                    - BYN
                    - BZD
                    - CAD
                    - CDF
                    - CHF
                    - CLP
                    - CNY
                    - COP
                    - CRC
                    - CVE
                    - CZK
                    - DJF
                    - DKK
                    - DOP
                    - DZD
                    - EGP
                    - ETB
                    - EUR
                    - FJD
                    - FKP
                    - GBP
                    - GEL
                    - GIP
                    - GMD
                    - GNF
                    - GTQ
                    - GYD
                    - HKD
                    - HNL
                    - HTG
                    - HUF
                    - IDR
                    - ILS
                    - INR
                    - ISK
                    - JMD
                    - JPY
                    - KES
                    - KGS
                    - KHR
                    - KMF
                    - KRW
                    - KYD
                    - KZT
                    - LAK
                    - LBP
                    - LKR
                    - LRD
                    - LSL
                    - MAD
                    - MDL
                    - MGA
                    - MKD
                    - MMK
                    - MNT
                    - MOP
                    - MUR
                    - MVR
                    - MWK
                    - MXN
                    - MYR
                    - MZN
                    - NAD
                    - NGN
                    - NIO
                    - NOK
                    - NPR
                    - NZD
                    - PAB
                    - PEN
                    - PGK
                    - PHP
                    - PKR
                    - PLN
                    - PYG
                    - QAR
                    - RON
                    - RSD
                    - RUB
                    - RWF
                    - SAR
                    - SBD
                    - SCR
                    - SEK
                    - SGD
                    - SHP
                    - SLE
                    - SOS
                    - SRD
                    - STD
                    - SZL
                    - THB
                    - TJS
                    - TOP
                    - TRY
                    - TTD
                    - TWD
                    - TZS
                    - UAH
                    - UGX
                    - UYU
                    - UZS
                    - VND
                    - VUV
                    - WST
                    - XAF
                    - XCD
                    - XCG
                    - XOF
                    - XPF
                    - YER
                    - ZAR
                    - ZMW
                    - BHD
                    - KWD
                    - OMR
                  description: The three-letter ISO currency code (e.g., USD, GBP, EUR). If not
                    provided the checkout will use geolocation. For geolocation
                    to work all line item prices on the plan must have the same
                    default currency.
                metadata:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      quantity:
                        type: number
                        description: Not applicable to metered line items and per seat line items with
                          billing scheme fixed.
                    required:
                      - quantity
                    additionalProperties: false
                  description: Optionally set config for each line item by using the line item
                    slug as the key in the object.
                email:
                  type: string
                  format: email
                  description: The email address of the customer. If the owner already exists in
                    the system and does not have a Stripe email it will be used
                    to either create or update the Stripe customer record.
                cancelUrl:
                  type: string
                  format: uri
                  description: The URL to redirect the customer to if they cancel the checkout. If
                    not provided, falls back to the product default setting.
                successUrl:
                  type: string
                  format: uri
                  description: The URL to redirect the customer to after successful payment. If
                    not provided, falls back to the product default setting.
                allowPromoCodes:
                  type: boolean
                  description: Whether to allow customers to enter promotional codes during
                    checkout. Defaults to product setting if not specified.
                automaticTax:
                  type: boolean
                  description: Whether to enable automatic tax calculation based on customer
                    location. Defaults to product setting if not specified.
                collectBillingAddress:
                  type: boolean
                  description: Whether to collect the customer billing address during checkout.
                    Defaults to product setting if not specified.
                collectShippingAddress:
                  type: boolean
                  description: Whether to collect the customer shipping address during checkout.
                    Defaults to product setting if not specified.
                cardPrefillPreference:
                  type: string
                  enum:
                    - none
                    - always
                    - choice
                  description: 'Controls how saved payment methods are handled. Options: "always"
                    (always save), "choice" (customer chooses), "none" (never
                    save). Defaults to product setting if not specified.'
                trialPeriodDays:
                  type: number
                  minimum: 1
                  maximum: 730
                  description: The number of days for the trial period on subscription. If not
                    provided, falls back to the plan default trial period.
              required:
                - planId
                - owner
                - interval
                - intervalCount
              additionalProperties: false
              $schema: http://json-schema.org/draft-07/schema#
      responses:
        "200":
          description: Successfully generated checkout link
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    const: object
                    type: string
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                    required:
                      - url
                required:
                  - type
                  - data
        "400":
